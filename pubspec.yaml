name: climaguard
description: "연령별 맞춤형 재난 예측·대피 큐레이션 플랫폼"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 라우팅
  go_router: ^14.8.1

  # 네트워크
  dio: ^5.8.0+1

  # 데이터 모델
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # 환경변수 (API 키)
  flutter_dotenv: ^5.2.1

  # 위치 서비스
  geolocator: ^13.0.4

  # 로컬 저장
  shared_preferences: ^2.5.3

  # 로컬 알림
  flutter_local_notifications: ^18.0.1

  # 지도 (네이버 Dynamic Map)
  flutter_naver_map: ^1.3.1

  # AI (Gemini)
  google_generative_ai: ^0.4.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # URL 열기
  url_launcher: ^6.3.1

  # 날짜 포맷
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 코드 생성
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.3

  # 린트
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

  # 앱 아이콘 생성
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  windows:
    generate: true
  macos:
    generate: true
  web:
    generate: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/geo/gyeonggi_emd.geojson
    - assets/icon/app_icon.png
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Thin.ttf
          weight: 100
        - asset: assets/fonts/Pretendard-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Pretendard-Light.ttf
          weight: 300
        - asset: assets/fonts/Pretendard-Regular.ttf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.ttf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.ttf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Pretendard-Black.ttf
          weight: 900
